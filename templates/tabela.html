<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel = 'stylesheet' href="/static/style.css">
    <title>SENAI</title>
</head>
<body>

    <div id="topbar">
        <span class="material-symbols-outlined">menu</span>
        <div id="logo">
            <img src="/static/logo_sistema.png">
        </div>
    
        <div class="menu-topbar">
            <a href="/tabela" class="menu-item">Home</a>
            <a href="/editar" class="menu-item">Editar</a>
        </div>
    
        <div id="perfil">
            <img src="/static/logo_perfil.png">
        </div>
    </div>
    
    <h1 id="titulo">Bem-vindo(a) ao Almoxarifado!</h1>


    <div class="table-container">
        <table class="table table-bordered tabela-estoque">
            <tr>
                <th>ID</th>
                <th>NOME</th>
                <th>QUANTIDADE</th>
            </tr>

            {% for item in resultado %}

            <tr>
                <td>{{item[0]}}</td>
                <td>{{item[1]}}</td>
                <td>{{item[2]}}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
