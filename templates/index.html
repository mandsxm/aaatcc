<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI</title>
    <link rel="stylesheet" href ="static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body id="login-body">
    <div id="login-page">
        <div id="login-img">
            <img src="static/indust.png" alt="login-img">
        </div>
        <div id="login-form">
            <div id="login-card">
                <div id="fiep-img">
                    <img src="static/fiep.png" alt="fiep-img">
                </div>
                <div class="mb-3">
                    <label>Usuário</label>
                    <input type="text" class="form-control" id="usuario" placeholder="Digite seu email">
                </div>
                <div class="mb-3">
                    <label>Senha</label>
                    <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                </div>
                <div>
                    <button id="btn-entrar" type="button" class="btn btn-primary">Entrar</button>
                </div>
                <div>
                    <button id="btn-criarconta" type="button" class="btn btn-link">Criar uma conta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/static.js"></script>
</body>
</html>
